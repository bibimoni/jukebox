version: 1
ui:
  sidebar_visible: true
  player_bar_hidden: false
  pane_status_line_visible: true
keybindings:
  pane.prefix: ["Ctrl+w"]
  pane.edit.toggle: ["E"]
  pane.focus_left: ["Alt+h"]
  pane.focus_down: ["Alt+j"]
  pane.focus_up: ["Alt+k"]
  pane.focus_right: ["Alt+l"]
  pane.cycle_next: ["Tab"]
  pane.cycle_prev: ["Shift+Tab"]
  navigation.view_artists: ["1"]
  navigation.view_playlists: ["2"]
  navigation.view_queue: ["3"]
  navigation.view_youtube: ["4"]
  navigation.view_cycle_next: ["Tab"]
  navigation.view_cycle_prev: ["Shift+Tab"]
  playback.play_selected: ["Enter"]
  playback.resume_or_toggle: ["Space"]
  playback.next: [">"]
  playback.previous: ["<"]
  playback.seek_back: [","]
  playback.seek_forward: ["."]
  volume.up: ["+"]
  volume.down: ["-"]
  volume.mute_toggle: ["m"]
  shuffle.cycle: ["z"]
  shuffle.reshuffle: ["Z"]
  repeat.cycle: ["r"]
  continue.cycle: ["c"]
  source_mode.cycle: ["M"]
  youtube.refresh_surface: ["R"]
  keybindings.open: ["Ctrl+k"]
  help.open: ["?"]
  search.open: ["/"]
  command.open: [":"]
